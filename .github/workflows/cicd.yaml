deploy:
  runs-on: ubuntu-latest
  needs: build-and-push

  steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{secrets.HOST}}
        username: ${{secrets.USERNAME}}
        key: ${{secrets.SSH_KEY}}

        script: |
          echo "${{secrets.CR_PAT}}" | docker login ghcr.io -u ${{secrets.USERNAME}} --password-stdin

          REPO_LOWER=$(echo "${{github.repository}}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=ghcr.io/$REPO_LOWER:main

          # Pull latest image
          docker pull $IMAGE_TAG

          # Create .env file dynamically
          cat <<EOF > .env
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_NOTES_DB_ID=${{ secrets.NOTION_NOTES_DB_ID }}
          NOTION_CALENDAR_DB_ID=${{ secrets.NOTION_CALENDAR_DB_ID }}
          EOF

          # Stop old containers
          docker-compose down || true

          # Start new container
          docker-compose up -d

          # Show logs (last 50 lines)
          docker logs --tail 50 react_agent_container